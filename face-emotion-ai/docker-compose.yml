version: '3.9'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emotiscan-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - emotiscan-db:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/app/data/emotiscan.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emotiscan-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  emotiscan-db:
